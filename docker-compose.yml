services:
  postgres:
    image: postgres:16-alpine
    container_name: fique_ryco_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fique_ryco}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fique_ryco_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fique_ryco_app
    restart: always
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # No Docker sempre usar host "postgres"; .env local não deve sobrescrever isso
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-fique_ryco}?schema=public"
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      PORT: "3000"
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - fique_ryco_network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  fique_ryco_network:
    driver: bridge
